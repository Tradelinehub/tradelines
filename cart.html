<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRADELINES - Cart</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- Header with Navigation -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1><a href="index.html"> TRADELINES </a></h1>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <div class="header-icons">
                <a href="cart.html" class="nav-link cart-link">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </a>
                <a href="auth.html" class="user-icon"><i class="fas fa-user"></i></a>
            </div>
            <button class="menu-toggle">☰</button>
<script>
document.querySelector('.menu-toggle').addEventListener('click', function() {
    document.querySelector('.main-nav').classList.toggle('active');
});
</script>
        </div>
    </header>
    
            <main class="cart-page">
                <div class="container">
                    <div class="cart-header">
                        <h2>Your Shopping Cart</h2>
                        <button id="clear-cart" class="btn btn-clear">Clear Cart</button>
                    </div>
                    
                    <div id="cart-empty" class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-shopping-cart"></i>
                        </div>
                        <h3>Your cart is empty</h3>
                        <p>Looks like you haven't added any tradelines yet</p>
                        <a href="index.html" class="btn btn-primary">Browse Tradelines</a>
                    </div>
        
                    <div id="cart-items" class="cart-items">
                        <div class="cart-table-container">
                            <table class="cart-table">
                                <thead>
                                    <tr>
                                        <th class="product-col">Product</th>
                                        <th class="price-col">Price</th>
                                        <th class="quantity-col">Quantity</th>
                                        <th class="total-col">Total</th>
                                        <th class="action-col"></th>
                                    </tr>
                                </thead>
                                <tbody id="cart-table-body">
                                    <!-- Cart items will be inserted here -->
                                </tbody>
                                <tfoot>
                                    <tr>
                                        <td colspan="3" class="text-right">Subtotal:</td>
                                        <td id="cart-subtotal" class="subtotal">$0.00</td>
                                        <td></td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
        
                        <div class="cart-actions">
                            <a href="index.html" class="btn btn-continue">
                                <i class="fas fa-arrow-left"></i> Continue Shopping
                            </a>
                            <a href="checkout.html">
                                <button id="checkout-btn" class="btn btn-checkout">
                                    Proceed to Checkout <i class="fas fa-arrow-right"></i>
                                </button>
                            </a>                            
                        </div>
                    </div>
                </div>
            </main>
    <script src="cart.js"></script>
    <script src="cart-functions.js"></script>
</body>
</html>
